name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  rust:
    name: Rust (clippy / fmt / test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test

  python:
    name: Python ${{ matrix.python-version }} (ruff / ty / pytest)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python dependencies
        env:
          UV_PYTHON: ${{ matrix.python-version }}
        run: uv sync --extra dev

      - name: Format check
        run: uv run ruff format --check python/

      - name: Lint
        run: uv run ruff check python/

      - name: Build extension (needed for type checking and tests)
        run: uv run maturin develop --release

      - name: Type check
        run: uv run ty check python/

      - name: Test
        run: uv run pytest
