name: Deploy docs

on:
  push:
    branches: [main]
    tags:
      - "v*"

permissions:
  contents: write  # mike commits to gh-pages branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # mike needs full history

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install docs dependencies
        env:
          UV_PYTHON: "3.12"
        run: uv sync --extra docs

      - name: Configure git for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy latest (on push to main)
        if: github.ref_type == 'branch'
        run: uv run mike deploy --push --update-aliases latest

      - name: Deploy versioned release (on tag)
        if: github.ref_type == 'tag'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          MINOR="${VERSION%.*}"
          uv run mike deploy --push --update-aliases "${MINOR}" latest
