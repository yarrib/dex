name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate:
    name: Validate tag and version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check tag format
        run: |
          TAG="${GITHUB_REF_NAME}"
          if ! echo "${TAG}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Error: tag '${TAG}' does not match v<major>.<minor>.<patch>"
            exit 1
          fi

      - name: Verify pyproject.toml version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          TOML_VERSION="$(python3 -c "
          import tomllib, sys
          with open('pyproject.toml', 'rb') as f:
              data = tomllib.load(f)
          sys.stdout.write(data['project']['version'])
          ")"
          if [ "${TAG_VERSION}" != "${TOML_VERSION}" ]; then
            echo "Error: tag version '${TAG_VERSION}' does not match pyproject.toml version '${TOML_VERSION}'"
            echo "Run 'python3 scripts/bump-version.py ${GITHUB_REF_NAME}' locally and commit before tagging."
            exit 1
          fi

  changelog:
    name: Generate changelog
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog with git-cliff
        uses: orhun/git-cliff-action@v3
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG_RELEASE.md
          GITHUB_REPO: ${{ github.repository }}

      - uses: actions/upload-artifact@v4
        with:
          name: changelog
          path: CHANGELOG_RELEASE.md

  build-wheels:
    name: Build wheels (${{ matrix.os }} / ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: validate
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: macos-latest
            target: x86_64
          - os: macos-latest
            target: aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        run: python3 scripts/bump-version.py ${{ github.ref_name }}

      - name: Setup Python versions (macOS)
        if: runner.os == 'macOS'
        uses: actions/setup-python@v5
        with:
          python-version: |
            3.11
            3.12
            3.13

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --interpreter python3.11 python3.12 python3.13
          manylinux: auto

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        run: python3 scripts/bump-version.py ${{ github.ref_name }}

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  release:
    name: Create GitHub Release
    needs: [changelog, build-wheels, build-sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: changelog
          path: .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body_path: CHANGELOG_RELEASE.md
