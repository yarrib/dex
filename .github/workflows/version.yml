name: Auto-version

on:
  push:
    branches: [main]

jobs:
  version:
    # Skip the version bump commit itself to avoid an infinite loop
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine next version
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          dry_run: true
          default_bump: patch
          # feat: -> minor, fix:/chore:/etc -> patch, BREAKING CHANGE -> major

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bump version files
        run: python3 scripts/bump-version.py ${{ steps.tag.outputs.new_version }}

      - name: Commit, tag, and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml crates/dex-core/Cargo.toml crates/dex-py/Cargo.toml
          git commit -m "chore: bump version to ${{ steps.tag.outputs.new_version }}"
          git push origin main
          git tag v${{ steps.tag.outputs.new_version }}
          git push origin v${{ steps.tag.outputs.new_version }}
